name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set Up Flutter Engine
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Android Platform Files
        run: flutter create --platforms=android .

      - name: Fetch App Core Dependencies
        run: flutter pub get

      - name: Generate Isar Database Code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Compile High-Performance APK
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Upload Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
